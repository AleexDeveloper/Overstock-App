toml
[build]
  base = "frontend"
  command = "yarn install && yarn build"
  publish = "frontend/build"

[build.environment]
  NODE_VERSION = "18.17.0"
  REACT_APP_BACKEND_URL = "${REACT_APP_BACKEND_URL}"

[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "no-referrer"